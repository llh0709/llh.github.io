<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翊团招募说明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 页面背景和你之前的官网保持一致 */
            background-image: url("https://img.cdn1.vip/i/69ef7f7b361cf_1777303419.webp");
            background-size: 100% 100%;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 图片容器，让图片自适应居中，不超出屏幕 */
        .img-container {
            width: 100%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.65);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
        }

        /* 图片自适应容器，不拉伸 */
        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="img-container">
        <!-- 把你的图片放在这里，替换 src 即可 -->
        <img src="fuli.png" alt="翊团招募说明">
    </div>
</body>
</html>
