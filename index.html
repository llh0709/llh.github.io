<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>个人官网</title>
    <style>
        /* 全局清除默认边距，让视频铺满全屏 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 视频全屏固定背景 */
        video {
            position: fixed; /* 固定在屏幕 */
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            object-fit: fill;
        }

        h1 {
    font-size: 80px;
    color: #ffffff;
    text-shadow: 0 0 8px #ffff00, 0 0 12px #ffff00;
    text-align: center;
    letter-spacing: 4px;
    /* 🔥 这就是你要的：古风 + 签名 + 倾斜 完美字体 */
    font-family: "STKaiti", "KaiTi", "SimSun", serif;
    font-style: italic;
    font-weight: 700;
    margin-top: 4px;
}
        .gufeng2 {
            font-family: "SimSun", "宋体", serif;
            font-size: 45px;
            color: #ece911;
            letter-spacing: 3px;
        }
        h3 {
            writing-mode: vertical-rl;
            font-size: 80px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffff7f, 0 0 12px #ff0000;
            text-align: center;
            letter-spacing: 4px;
            font-family:"STCcaiyun","STFangsong",sursive;
            
            /* 竖排文字固定在左侧 */
            position: fixed;
            left: 30px;
            top: 50px;
        }

        h4 {
            font-size: 30px;
            color: #fff;
            
            /* 固定在右上角 */
            position: fixed;
            right: 35px;
            top: 50px;
        }

        /* 以下全是新增，不修改你原有样式 */
        .container {
            text-align: center;
            margin-top: 30px;
        }
        .school-nav {
            display: inline-flex;
            gap: 40px;
            background: rgba(255,255,255,0.85);
            padding: 12px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .school-nav a {
            font-size: 18px;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }
        .school-nav a:hover {
            color: #c00;
        }
        .school-footer {
            color: #fff;
            font-size: 15px;
            margin-top: 20px;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>

<body>
    <video src="./11.MP4" autoplay muted loop playsinline></video>
    
    <h1>三国谋定天下</h1>
	<hr>
    
    <!-- 导航 + 版权 全部放在标题下面 -->
    <div class="container">
        <div class="school-nav">
            <a href="#">首页</a>
            <a href="#">三谋智障榜</a>
            <a href="#">联系始皇</a>
            <a href="#">翊团招人</a>
            <a href="#"></a>
        </div>
        <div class="school-footer">
            三国谋定天下 秦始皇 © 版权所有 | 官方网站
        </div>
    </div>

   
 
</body>
</html>
