<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>个人官网</title>
    <style>
        /* 全局清除默认边距 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* ✅ ✅ ✅ GIF 全屏背景核心代码（GitHub 可用） */
        body {
            background-image: url("https://i.giphy.com/media/3o7qE1YN7aBOFPRw8E/11.gif");
            background-size: 100% 100%;         /* 铺满屏幕 */
            background-position: center;    /* 居中 */
            background-attachment: fixed;   /* 固定不动 */
            background-repeat: no-repeat;   /* 不重复 */
            background-color: #000;         /* 兜底黑色 */
        }

        h1 {
    font-size: 80px;
    color: #ffffff;
    text-shadow: 0 0 8px #ffff00, 0 0 12px #ffff00;
    text-align: center;
    letter-spacing: 4px;
    font-family: "STKaiti", "KaiTi", "SimSun", serif;
    font-style: italic;
    font-weight: 700;
    margin-top: 4px;
}
        .gufeng2 {
            font-family: "SimSun", "宋体", serif;
            font-size: 45px;
            color: #ece911;
            letter-spacing: 3px;
        }
        h3 {
            writing-mode: vertical-rl;
            font-size: 80px;
            color: #ffffff;
            text-shadow: 0 0 8px #ffff7f, 0 0 12px #ff0000;
            text-align: center;
            letter-spacing: 4px;
            font-family:"STCcaiyun","STFangsong",sursive;
            position: fixed;
            left: 30px;
            top: 50px;
        }

        h4 {
            font-size: 30px;
            color: #fff;
            position: fixed;
            right: 35px;
            top: 50px;
        }

        /* 导航在标题下方 */
        .container {
            text-align: center;
            margin-top: 30px;
        }
        .school-nav {
            display: inline-flex;
            gap: 40px;
            background: rgba(255,255,255,0.85);
            padding: 12px 30px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .school-nav a {
            font-size: 18px;
            color: #222;
            text-decoration: none;
            font-weight: bold;
        }
        .school-nav a:hover {
            color: #c00;
        }
        .school-footer {
            color: #fff;
            font-size: 15px;
            margin-top: 20px;
            text-shadow: 0 0 5px #000;
        }
    </style>
</head>

<body>
    <h1>三国谋定天下</h1>
	<hr>
    
    <div class="container">
        <div class="school-nav">
            <a href="#">首页</a>
            <a href="#">三谋智障榜</a>
            <a href="#">汉奸榜</a>
            <a href="#">翊团招人</a>
            <a href="#">联系始皇</a>
        </div>
        <div class="school-footer">
            三国谋定天下 秦始皇 © 版权所有 | 官方网站
        </div>
    </div>

   
</body>
</html>
