<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 适配移动端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏积分排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* 排行榜容器 */
        .rank-container {
            width: 100%;
            max-width: 700px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-top: 30px;
        }

        /* 标题 */
        .rank-header {
            background: linear-gradient(90deg, #ff6b6b, #ff8e53);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        /* 列表 */
        .rank-list {
            list-style: none;
        }

        /* 列表项 */
        .rank-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .rank-item:hover {
            background: #f8f9fa;
            transform: translateX(5px);
        }

        /* 排名数字 */
        .rank-num {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }

        /* 前三名高亮 */
        .rank-item:nth-child(1) .rank-num {
            background: #ffd700;
            color: #b8860b;
        }
        .rank-item:nth-child(2) .rank-num {
            background: #c0c0c0;
            color: #696969;
        }
        .rank-item:nth-child(3) .rank-num {
            background: #cd7f32;
            color: white;
        }

        /* 头像 */
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            border: 2px solid #f0f0f0;
        }

        /* 用户信息 */
        .user-info {
            flex: 1;
        }
        .username {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 3px;
        }
        .level {
            font-size: 12px;
            color: #999;
        }

        /* 分数 */
        .score {
            font-size: 18px;
            font-weight: bold;
            color: #ff6b6b;
        }

        /* 响应式适配 */
        @media (max-width: 480px) {
            .rank-header {
                font-size: 20px;
            }
            .username {
                font-size: 14px;
            }
            .score {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="rank-container">
        <div class="rank-header"> 三谋文勋排行榜</div>
        <ul class="rank-list" id="rankList">
            <!-- 排行榜数据会渲染在这里 -->
        </ul>
    </div>

    <script>
        // 排行榜数据（可自行修改）
        const rankData = [
            { id: 1, name: "晚安", avatar: "33.png", level: "现任女仆团 红都不详 实力路边一条", score: " tao939437180 " },
           

        ];

        // 渲染排行榜
        const renderRank = () => {
            const list = document.getElementById('rankList');
            rankData.forEach(item => {
                const li = document.createElement('li');
                li.className = 'rank-item';
                li.innerHTML = `
                    <div class="rank-num">${item.id}</div>
                    <img src="${item.avatar}" alt="头像" class="avatar">
                    <div class="user-info">
                        <div class="username">${item.name}</div>
                        <div class="level">${item.level}</div>
                    </div>
                    <div class="score">${item.score} 微信号</div>
                `;
                list.appendChild(li);
            });
        };

        // 页面加载完成后渲染
        window.onload = renderRank;
    </script>
</body>
</html>
